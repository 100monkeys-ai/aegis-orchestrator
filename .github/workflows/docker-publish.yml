name: Docker Publish

on:
  push:
    branches:
      - main       # Publishes :latest + :sha-<short>
    tags:
      - '*.*.*'   # Publishes semver tags (e.g. 0.1.0 → 0.1.0, 0.1, 0)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 100monkeys-ai/aegis-runtime

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: aegis-orchestrator

      - name: Checkout aegis-proto
        uses: actions/checkout@v6
        with:
          repository: 100monkeys-ai/aegis-proto
          path: aegis-proto

      # --- Native Rust build (replaces in-Docker compilation) ---

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libfuse3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: aegis-orchestrator -> target

      - name: Build release binary
        working-directory: aegis-orchestrator
        run: cargo build --release --bin aegis --locked

      - name: Stage binary for Docker context
        run: cp aegis-orchestrator/target/release/aegis ./aegis

      # --- Docker image packaging ---

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Push :latest on every push to main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Push semver tags on version tag push
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Push short SHA for traceability on main branch
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: aegis-orchestrator/docker/Dockerfile.runtime-slim
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
