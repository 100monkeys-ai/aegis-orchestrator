# Unified CI/CD pipeline for aegis-orchestrator.
# All checks must pass before the build+deploy stage runs.
# Runs on the self-hosted aegis-devops runner for fast incremental builds.

name: Pipeline

on:
  push:
    branches: [main]
    tags: ['*.*.*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: 100monkeys-ai/aegis-runtime

jobs:
  # ── Stage 1: All checks in parallel ────────────────────────────────────────
  fmt:
    name: Format
    runs-on: [self-hosted, aegis-devops]
    steps:
      - uses: actions/checkout@v6
        with:
          path: aegis-orchestrator

      - uses: actions/checkout@v6
        with:
          repository: 100monkeys-ai/aegis-proto
          path: aegis-proto

      - name: Check formatting
        working-directory: aegis-orchestrator
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: [self-hosted, aegis-devops]
    steps:
      - uses: actions/checkout@v6
        with:
          path: aegis-orchestrator

      - uses: actions/checkout@v6
        with:
          repository: 100monkeys-ai/aegis-proto
          path: aegis-proto

      - name: Clippy
        working-directory: aegis-orchestrator
        run: cargo clippy --workspace --locked -- -D warnings

  test:
    name: Test
    runs-on: [self-hosted, aegis-devops]
    steps:
      - uses: actions/checkout@v6
        with:
          path: aegis-orchestrator

      - uses: actions/checkout@v6
        with:
          repository: 100monkeys-ai/aegis-proto
          path: aegis-proto

      - name: Run tests
        working-directory: aegis-orchestrator
        run: cargo test --workspace --locked

  doc:
    name: Documentation
    runs-on: [self-hosted, aegis-devops]
    env:
      RUSTDOCFLAGS: "--cfg docsrs -D warnings"
    steps:
      - uses: actions/checkout@v6
        with:
          path: aegis-orchestrator

      - uses: actions/checkout@v6
        with:
          repository: 100monkeys-ai/aegis-proto
          path: aegis-proto

      - name: Build documentation
        working-directory: aegis-orchestrator
        run: |
          cargo doc \
            --workspace \
            --locked \
            --no-deps \
            --document-private-items \
            -p aegis-orchestrator-core \
            -p aegis-orchestrator-swarm \
            -p aegis-orchestrator-sdk \
            -p aegis-orchestrator

  # ── Stage 2: Build + Deploy + Publish (only after ALL checks pass) ─────────
  build-deploy:
    name: Build, Deploy & Publish
    needs: [fmt, clippy, test, doc]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: [self-hosted, aegis-devops]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          path: aegis-orchestrator

      - uses: actions/checkout@v6
        with:
          repository: 100monkeys-ai/aegis-proto
          path: aegis-proto

      # Build the release binary using the persistent cargo cache
      - name: Build release binary
        working-directory: aegis-orchestrator
        run: cargo build --release --bin aegis --locked

      # Build the runtime Docker image locally with Podman
      - name: Build runtime image
        run: |
          cp aegis-orchestrator/target/release/aegis ./aegis
          podman build \
            -f aegis-orchestrator/docker/Dockerfile.runtime-slim \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7} \
            .

      # Deploy locally — restart the core pod with the new image
      - name: Deploy to local pod
        run: |
          podman pod stop aegis-core || true
          podman pod rm aegis-core || true
          # The pod will be recreated by make redeploy using the local image
          cd ~/aegis-platform-deployment && make redeploy POD=core

      # Push to GHCR in parallel with deploy (for external consumers)
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}

      # Semver tags for release pushes
      - name: Tag and push semver (release only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f1-2)
          podman tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION
          podman tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$MINOR
          podman tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$MAJOR
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$MINOR
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$MAJOR

  # ── Security (unchanged, runs on GitHub-hosted) ────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
