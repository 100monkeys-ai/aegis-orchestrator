  create-release:
    name: Create GitHub Release
    needs: [build-linux]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
        with:
          path: aegis-orchestrator

      - uses: actions/checkout@v6
        with:
          repository: 100monkeys-ai/aegis-proto
          path: aegis-proto

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          else
            # Main branch push - create pre-release with commit SHA
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            VERSION="v0.0.0-main.${SHORT_SHA}"
            echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate checksums
        run: |
          find artifacts -name '*.tar.gz' -exec sh -c 'sha256sum "$1" > "$1.sha256"' _ {} \;

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: AEGIS ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ env.FORCE_PRERELEASE == 'true' || steps.version.outputs.IS_PRERELEASE == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/aegis-linux-x86_64.tar.gz
            artifacts/aegis-linux-x86_64.tar.gz.sha256
            # artifacts/aegis-macos-aarch64.tar.gz
            # artifacts/aegis-macos-aarch64.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
