name: Release

on:
  push:
    # branches:
    #   - main
    tags:
      - '*.*.*'  # Matches 0.1.0, 0.2.0-pre-alpha, etc.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: aegis
  FORCE_PRERELEASE: 'true'  # TODO: set to 'false' or remove after alpha

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v6
        with:
          path: aegis-orchestrator

      - uses: actions/checkout@v6
        with:
          repository: 100monkeys-ai/aegis-proto
          path: aegis-proto

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libfuse3-dev libpq-dev pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2-ubuntu22"
          workspaces: aegis-orchestrator -> target

      - name: Build release binary
        working-directory: aegis-orchestrator
        run: |
          cargo build --release --bin aegis --locked

      - name: Create tarball
        working-directory: aegis-orchestrator
        run: |
          cd target/release
          tar -czf aegis-linux-x86_64.tar.gz aegis
          cd ../..
          mv target/release/aegis-linux-x86_64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: aegis-linux-x86_64
          path: aegis-orchestrator/aegis-linux-x86_64.tar.gz
          if-no-files-found: error
          retention-days: 1

