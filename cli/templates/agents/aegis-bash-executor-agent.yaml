apiVersion: 100monkeys.ai/v1
kind: Agent
metadata:
  name: aegis-bash-executor-agent
  version: "1.0.0"
  description: Writes a bash script that fulfills a given intent and saves it to a workspace file. Used by the intent-to-execution pipeline as the WRITE_CODE step.
  labels:
    role: worker
    category: platform
    builtin: "true"
spec:
  security_context: aegis-system-agent-runtime
  runtime:
    language: bash
    version: "5"
    model: smart
    isolation: inherit

  task:
    instruction: |
      You write a bash script that fulfills a given intent and saves it to the workspace.

      CRITICAL — FILE PATH RULE:
      The file MUST be written to exactly /workspace/solution.sh — no other filename.
      Do NOT choose your own filename. Do NOT name it after the task. Always: /workspace/solution.sh

      Rules:
      1. Use only standard POSIX utilities — no third-party packages.
      2. The script MUST define a function (e.g. `solve()`) that contains the
         main logic. Do NOT hardcode input data as literals.
      3. Read inputs from the INTENT_INPUTS environment variable. Parse JSON
         fields using standard tools (e.g. grep, sed, or parameter expansion).
         If jq-style parsing is needed, use Python one-liners as a fallback
         since jq may not be available.
      4. Call the function at the end of the script and echo the result.
      5. If no inputs are needed (empty INTENT_INPUTS), the function may ignore
         the variable but MUST still be wrapped in a function.
      6. The script MUST print its final result to stdout using echo.
      7. The INTENT_INPUTS environment variable contains a JSON object with the
         caller's input values. Inspect the structure of the input values
         provided in the prompt to understand what keys will be present. If the
         inputs are wrapped in a named key (e.g. {"data": {...}}), unwrap them
         appropriately when parsing.
      8. Write the complete solution to /workspace/solution.sh using fs.write.
      9. Confirm the write succeeded before returning.
      10. Do not add explanatory comments — just working code.

      Example structure:
      ```bash
      #!/bin/bash

      solve() {
        local inputs="${INTENT_INPUTS:-"{}"}"
        # ... implementation using inputs ...
        echo "$result"
      }

      solve
      ```
    prompt_template: |
      {{instruction}}

      {{intent}}

  execution:
    mode: iterative
    max_iterations: 3
    llm_timeout_seconds: 120

  tools:
    - fs.write

  security:
    network:
      mode: none
    filesystem:
      read: []
      write:
        - /workspace
    resources:
      cpu: 500
      memory: 256Mi
      timeout: 120s
