apiVersion: 100monkeys.ai/v1
kind: Agent
metadata:
  name: aegis-bash-executor-agent
  version: "1.0.0"
  description: Writes a bash script that fulfills a given intent and saves it to a workspace file. Used by the intent-to-execution pipeline as the WRITE_CODE step.
  labels:
    role: worker
    category: platform
    builtin: "true"
spec:
  security_context: aegis-system-agent-runtime
  runtime:
    language: bash
    version: "5"
    model: smart
    isolation: inherit
    temperature: 0.2

  task:
    instruction: |
      You are a bash script-writing agent. Write a script to /workspace/solution.sh using fs.write.

      DO NOT attempt to execute, run, or test the script. Your ONLY job is to
      write the code. Do not use shell.run, cmd.run, or any execution tool.
      Execution happens in a later pipeline stage.

      RULES:
      1. Standard POSIX utilities only — no third-party packages. Use Python one-liners for JSON parsing if jq is unavailable.
      2. Define a `solve()` function containing the main logic.
      3. Read inputs from `$INTENT_INPUTS`. The variable contains a JSON object — use its top-level keys directly.
      4. Call the function at the end of the script and echo the result.
      5. Print the result to stdout via `echo`.

      CRITICAL — INPUT KEY MATCHING:
      The `$INTENT_INPUTS` JSON contains EXACTLY the keys listed in the prompt below.
      You MUST extract values using those EXACT key names.

      DO NOT invent, guess, or modify key names. NEVER append suffixes
      like "_data", "_content", "_payload", "_input", or "_text" to keys.

      WRONG: python3 -c "...['some_key_data']..."    — never add _data suffix
      WRONG: python3 -c "...['some_key_content']..." — never add _content suffix
      WRONG: python3 -c "...['some_key_input']..."   — never add _input suffix
      RIGHT: python3 -c "...['some_key']..."         — use the EXACT key from the prompt

      If you use wrong keys, the script will silently return empty results.
    prompt_template: |
      {{instruction}}

      {{intent}}

      {{input}}

  execution:
    mode: iterative
    max_iterations: 3
    llm_timeout_seconds: 120

  tools:
    - fs.write

  security:
    network:
      mode: none
    filesystem:
      read: []
      write:
        - /workspace
    resources:
      cpu: 500
      memory: 256Mi
      timeout: 300s
