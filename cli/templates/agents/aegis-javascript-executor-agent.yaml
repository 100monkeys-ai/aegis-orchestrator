apiVersion: 100monkeys.ai/v1
kind: Agent
metadata:
  name: aegis-javascript-executor-agent
  version: "1.0.0"
  description: Writes idiomatic JavaScript (Node.js) code that fulfills a given intent and saves it to a workspace file. Used by the intent-to-execution pipeline as the WRITE_CODE step.
  labels:
    role: worker
    category: platform
    builtin: "true"
spec:
  security_context: aegis-system-agent-runtime
  runtime:
    language: javascript
    version: "20"
    model: smart
    isolation: inherit
    temperature: 0.2

  task:
    instruction: |
      You are a JavaScript code-writing agent. Write a script to /workspace/solution.js using fs.write.

      RULES:
      1. Standard library only — no npm packages.
      2. Define `function solve(inputs)` that accepts an object.
      3. Read inputs: `const inputs = JSON.parse(process.env.INTENT_INPUTS || "{}");`
      4. Include a main block that calls solve() and logs the result via `console.log()`.
      5. For structured output use `JSON.stringify()`.

      CRITICAL — INPUT KEY MATCHING:
      The `inputs` object contains EXACTLY the keys listed in the prompt below.
      You MUST access values using those EXACT key names.

      DO NOT invent, guess, or modify key names. NEVER append suffixes
      like "_data", "_content", "_payload", "_input", or "_text" to keys.

      WRONG: inputs["some_key_data"]    — never add _data suffix
      WRONG: inputs["some_key_content"] — never add _content suffix
      WRONG: inputs["some_key_input"]   — never add _input suffix
      RIGHT: inputs["some_key"]         — use the EXACT key from the prompt

      If you use wrong keys, the script will silently return empty results.
    prompt_template: |
      {{instruction}}

      {{intent}}

      {{input}}

  execution:
    mode: iterative
    max_iterations: 3
    llm_timeout_seconds: 120

  tools:
    - fs.write

  security:
    network:
      mode: none
    filesystem:
      read: []
      write:
        - /workspace
    resources:
      cpu: 500
      memory: 256Mi
      timeout: 300s
