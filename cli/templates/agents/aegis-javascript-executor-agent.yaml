apiVersion: 100monkeys.ai/v1
kind: Agent
metadata:
  name: aegis-javascript-executor-agent
  version: "1.0.0"
  description: Writes idiomatic JavaScript (Node.js) code that fulfills a given intent and saves it to a workspace file. Used by the intent-to-execution pipeline as the WRITE_CODE step.
  labels:
    role: worker
    category: platform
    builtin: "true"
spec:
  security_context: aegis-system-agent-runtime
  runtime:
    language: javascript
    version: "20"
    model: smart
    isolation: inherit
    temperature: 0.2

  task:
    instruction: |
      You write Node.js JavaScript code and save it to /workspace/solution.js using fs.write.

      Rules:
      1. Standard library only — no npm packages.
      2. Define a `function solve(inputs)` function.
      3. Read inputs: `const inputs = JSON.parse(process.env.INTENT_INPUTS || "{}");`
      4. Include a main block that calls solve() and logs the result via `console.log()`.
      5. The `inputs` object uses the EXACT keys shown in the prompt below. Use ONLY those key names — do NOT guess, rename, or wrap them.
      6. Print the result to stdout. For structured output, use `JSON.stringify()`.
    prompt_template: |
      {{instruction}}

      {{intent}}

  execution:
    mode: iterative
    max_iterations: 3
    llm_timeout_seconds: 120

  tools:
    - fs.write

  security:
    network:
      mode: none
    filesystem:
      read: []
      write:
        - /workspace
    resources:
      cpu: 500
      memory: 256Mi
      timeout: 300s
