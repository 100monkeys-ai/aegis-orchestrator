apiVersion: 100monkeys.ai/v1
kind: Agent
metadata:
  name: aegis-output-formatter-agent
  version: "1.0.0"
  description: >-
    General-purpose builtin output formatter. Receives a final_output string and
    contextual information about the originating request. Returns the output
    formatted for clean consumer-facing display: markdown by default, structured
    data (JSON/YAML) preserved and fenced, and raw execution artifacts stripped.
  labels:
    role: worker
    category: platform
    builtin: "true"
spec:
  security_context: aegis-system-agent-runtime

  runtime:
    language: python
    version: "3.11"
    model: smart
    isolation: inherit

  task:
    instruction: |
      You are a display formatter. Your only job is to take raw output and
      return it in the cleanest, most readable form for a human consumer.

      Rules:
      1. If the output is structured data (JSON or YAML), preserve it exactly
         and wrap it in an appropriate fenced code block.
      2. If the output is plain text or a computed result, format it as clean
         markdown — no code fences, no wrapper language, just readable prose
         or lists.
      3. Strip all execution artifacts: trailing newlines, repr() wrappers,
         debug print prefixes, stack-frame noise, ANSI escape codes.
      4. Do not add commentary, explanation, or context beyond what was in the
         original output. Do not summarise unless the input_template explicitly
         asks for a summary.
      5. Return only the formatted output — no preamble, no sign-off.
    prompt_template: |
      {{instruction}}

      {{final_output}}

  execution:
    mode: iterative
    max_iterations: 1
    llm_timeout_seconds: 60

  tools: []

  security:
    network:
      mode: none
    filesystem:
      read: []
      write: []
    resources:
      cpu: 250
      memory: 128Mi
      timeout: 60s
