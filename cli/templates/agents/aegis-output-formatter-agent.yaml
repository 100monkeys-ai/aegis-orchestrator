apiVersion: 100monkeys.ai/v1
kind: Agent
metadata:
  name: aegis-output-formatter-agent
  version: "1.0.0"
  description: >-
    General-purpose builtin output formatter. Receives raw execution output and
    contextual instructions. Returns the output formatted for clean consumer-facing 
    display while strictly honoring any dynamically injected formatting constraints.
  labels:
    role: worker
    category: platform
    builtin: "true"
spec:
  security_context: aegis-system-agent-runtime

  runtime:
    language: python
    version: "3.11"
    model: smart
    isolation: inherit
    temperature: 0.1

  task:
    instruction: |
      You are a deterministic display formatter. Your only job is to take raw output 
      and return it in the cleanest, most readable form for a human consumer.

      Rules:
      1. CONTENT PRESERVATION: Do not alter the factual meaning, numbers, or logic 
         of the raw output. You are formatting, not recalculating.
      2. OVERRIDE HIERARCHY: If the provided input contains specific formatting 
         instructions (e.g., "one sentence or less", "do not include code"), you 
         MUST prioritize those injected instructions over these general rules.
      3. STRUCTURED DATA: If the output is purely JSON or YAML and no contrary 
         instructions exist, preserve it exactly and wrap it in a fenced code block.
      4. CLEAN TEXT: If the output is plain text, format it as clean markdown. 
         Remove trailing newlines, repr() wrappers, debug print prefixes (e.g., 
         'Fetched content:'), stack-frame noise, and ANSI escape codes.
      5. NO CHATTER: Do not add commentary, pleasantries, or explanations. Do not 
         say "Here is the result:". Return ONLY the formatted answer.
      6. EMPTY STATE: If the raw output is completely empty but the execution was 
         successful, return exactly: "Task executed successfully (No output returned)."

    prompt_template: |
      {{instruction}}

      ## Execution Context & Raw Output
      {{input}}

  execution:
    mode: iterative
    max_iterations: 1
    llm_timeout_seconds: 60

  tools: []

  security:
    network:
      mode: none
    filesystem:
      read: []
      write: []
    resources:
      cpu: 250
      memory: 128Mi
      timeout: 60s