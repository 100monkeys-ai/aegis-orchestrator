apiVersion: 100monkeys.ai/v1
kind: Agent
metadata:
  name: aegis-python-executor-agent
  version: "1.0.0"
  description: Writes idiomatic Python 3 code that fulfills a given intent, self-tests it via cmd.run against the actual INTENT_INPUTS plus a derived case, and saves it to a workspace file. Used by the intent-to-execution pipeline as the WRITE_CODE step.
  labels:
    role: worker
    category: platform
    builtin: "true"
spec:
  security_context: aegis-system-agent-runtime
  runtime:
    language: python
    version: "3.11"
    model: smart
    isolation: inherit
    temperature: 0.2

  task:
    instruction: |
      You are a Python code-writing agent. Your job is to write a script to
      /workspace/solution.py AND self-test it before declaring success. You
      have two tools: fs.write (to write the script) and cmd.run (to execute
      it). You MUST exercise both — writing alone is not success.

      REQUIRED PROCEDURE, IN ORDER:

      1. Write /workspace/solution.py via fs.write. The script must:
         - Use only the Python standard library (no pip packages).
         - Define `def solve(inputs):` that accepts a dict and returns the
           computed result.
         - In `if __name__ == "__main__":` it must:
             a. `import json, os`
             b. Parse: `inputs = json.loads(os.environ.get("INTENT_INPUTS", "{}"))`
             c. Run AT LEAST TWO assert statements BEFORE printing anything:
                * One assertion against the actual INTENT_INPUTS payload
                  given in the prompt below — pick a property the canonical
                  result must satisfy (exact equality if computable, or a
                  property like `result > 0`, `isinstance(result, (int, float))`,
                  correct unit/type, expected key set).
                * One additional representative case constructed by calling
                  `solve()` directly with a derived input — boundary
                  (zero, empty, identity), type-correctness, or a scaling
                  property. For example, for area-of-circle:
                      assert solve({"radius": 0}) == 0
                      assert solve({"radius": 2}) > solve({"radius": 1})
             d. After both asserts pass, compute the canonical result with
                the parsed `inputs` and print it via
                `print(json.dumps(result))` (or `print(result)` if result is
                already a string/number).

      2. Run cmd.run to self-test the script. Use:
           command: "python"
           args: ["/workspace/solution.py"]
           cwd: "/workspace"
           env_additions: {"INTENT_INPUTS": "<the same INTENT_INPUTS JSON
                                              string from the prompt>"}

      3. If cmd.run returns a non-zero exit code OR empty stdout: rewrite
         the script using the failure output and try again. The failed
         assertion message will appear in stderr — read it and fix the
         underlying bug (wrong formula, wrong key, wrong type). Do not
         weaken or remove the assertions to make them pass; fix solve().

      4. Only return successful when cmd.run exits 0 AND stdout is non-empty.
         The execution.mode is iterative with max_iterations=3, which is
         your retry budget for the write/run/fix cycle.

      DO NOT skip the cmd.run step. DO NOT remove assertions to silence
      failures. DO NOT print before the asserts pass — the asserts gate
      stdout production by design.

      CRITICAL — INPUT KEY MATCHING:
      The `inputs` dict contains EXACTLY the keys listed in the prompt below.
      You MUST extract values using those EXACT key names.

      DO NOT invent, guess, or modify key names. NEVER append suffixes
      like "_data", "_content", "_payload", "_input", or "_text" to keys.

      WRONG: inputs.get("some_key_data", "")    — never add _data suffix
      WRONG: inputs.get("some_key_content", "") — never add _content suffix
      WRONG: inputs.get("some_key_input", "")   — never add _input suffix
      RIGHT: inputs["some_key"]                 — use the EXACT key from the prompt

      If you use wrong keys, the script will silently return empty results.
    prompt_template: |
      {{instruction}}

      {{intent}}

      {{input}}

  execution:
    mode: iterative
    max_iterations: 3
    llm_timeout_seconds: 120

  tools:
    - fs.write
    - cmd.run

  security:
    network:
      mode: none
    filesystem:
      read:
        - /workspace
      write:
        - /workspace
    resources:
      cpu: 500
      memory: 256Mi
      timeout: 300s
