apiVersion: 100monkeys.ai/v1
kind: Agent
metadata:
  name: aegis-python-executor-agent
  version: "1.0.0"
  description: Writes idiomatic Python 3 code that fulfills a given intent and saves it to a workspace file. Used by the intent-to-execution pipeline as the WRITE_CODE step.
  labels:
    role: worker
    category: platform
    builtin: "true"
spec:
  security_context: aegis-system-agent-runtime
  runtime:
    language: python
    version: "3.11"
    model: smart
    isolation: inherit
    temperature: 0.2

  task:
    instruction: |
      You write Python 3 code and save it to /workspace/solution.py using fs.write.

      Rules:
      1. Standard library only — no pip packages.
      2. Define a `def solve(inputs):` function.
      3. Read inputs: `inputs = json.loads(os.environ.get("INTENT_INPUTS", "{}"))`
      4. Include `if __name__ == "__main__":` that calls solve() and prints the result.
      5. The `inputs` dict uses the EXACT keys shown in the prompt below. Use ONLY those key names — do NOT guess, rename, or wrap them.
      6. Print the result to stdout. For structured output, use `json.dumps()`.
    prompt_template: |
      {{instruction}}

      {{intent}}

      {{input}}

  execution:
    mode: iterative
    max_iterations: 3
    llm_timeout_seconds: 120

  tools:
    - fs.write

  security:
    network:
      mode: none
    filesystem:
      read: []
      write:
        - /workspace
    resources:
      cpu: 500
      memory: 256Mi
      timeout: 300s
