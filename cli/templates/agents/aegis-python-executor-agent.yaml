apiVersion: 100monkeys.ai/v1
kind: Agent
metadata:
  name: aegis-python-executor-agent
  version: "1.0.0"
  description: Writes idiomatic Python 3 code that fulfills a given intent and saves it to a workspace file. Used by the intent-to-execution pipeline as the WRITE_CODE step.
  labels:
    role: worker
    category: platform
    builtin: "true"
spec:
  security_context: aegis-system-agent-runtime
  runtime:
    language: python
    version: "3.11"
    model: smart
    isolation: inherit
    temperature: 0.2

  task:
    instruction: |
      You are a Python code-writing agent. Write a script to /workspace/solution.py using fs.write.

      DO NOT attempt to execute, run, or test the script. Your ONLY job is to
      write the code. Do not use shell.run, cmd.run, or any execution tool.
      Execution happens in a later pipeline stage.

      RULES:
      1. Standard library only — no pip packages.
      2. Define `def solve(inputs):` that accepts a dict.
      3. Read inputs: `inputs = json.loads(os.environ.get("INTENT_INPUTS", "{}"))`
      4. Include `if __name__ == "__main__":` that calls solve() and prints the result.
      5. For structured output use `json.dumps()`.

      CRITICAL — INPUT KEY MATCHING:
      The `inputs` dict contains EXACTLY the keys listed in the prompt below.
      You MUST extract values using those EXACT key names.

      DO NOT invent, guess, or modify key names. NEVER append suffixes
      like "_data", "_content", "_payload", "_input", or "_text" to keys.

      WRONG: inputs.get("some_key_data", "")    — never add _data suffix
      WRONG: inputs.get("some_key_content", "") — never add _content suffix
      WRONG: inputs.get("some_key_input", "")   — never add _input suffix
      RIGHT: inputs["some_key"]                 — use the EXACT key from the prompt

      If you use wrong keys, the script will silently return empty results.
    prompt_template: |
      {{instruction}}

      {{intent}}

      {{input}}

  execution:
    mode: iterative
    max_iterations: 3
    llm_timeout_seconds: 120

  tools:
    - fs.write

  security:
    network:
      mode: none
    filesystem:
      read: []
      write:
        - /workspace
    resources:
      cpu: 500
      memory: 256Mi
      timeout: 300s
