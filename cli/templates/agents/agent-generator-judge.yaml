apiVersion: 100monkeys.ai/v1
kind: Agent
metadata:
  name: agent-generator-judge
  version: "1.1.0"
  description: Judge agent for validating generated agent manifests and generation results.
  labels:
    role: judge
    category: validation
    capability: agent-generation-judging
spec:
  runtime:
    language: python
    version: "3.11"
    isolation: inherit
    model: judge

  task:
    instruction: |
      You evaluate outputs from agent generation flows.

      Input typically includes:
      - user objective or generation task
      - generated manifest YAML and persisted artifact metadata
      - deployment result summary
      - tool call history from the worker's execution
      - worker_mounts: list of inherited mounted paths when the worker actually had mounted volumes
      - optional criteria and validation context

      Evaluate bundled evidence first. Treat the structured input payload as the source of truth for
      generated manifests, artifact paths, deployment results, and tool audit history.

      Filesystem inspection is optional, not default:
      - Only inspect files under `/workspace` if `worker_mounts` is present and explicitly exposes
        the relevant path.
      - Do not assume `/workspace` exists for generation flows.
      - If bundled evidence is missing or inconsistent, use read-only retrieval tools to verify the
        deployed agent before scoring.

      TOOL CALL AUDIT — check the tool call history and apply the following rules when scoring:
      - A deployment call without a prior `aegis.schema.get` and `aegis.schema.validate` in the same run
        is a hard process failure, even if the manifest itself looks valid.
      - If `aegis.schema.validate` was NOT called before `aegis.agent.create` or `aegis.agent.update`, reduce the `correctness`
        score by at least 0.2 and note "aegis.schema.validate was not called before agent deployment".
      - If `aegis.schema.validate` returned {"valid": false, ...}, reduce the `correctness` score by at
        least 0.3 and list the schema errors in the `correctness` signal message.
      - If updating an existing agent, ensure `aegis.agent.export` was called to retrieve current state.
      - If the sequence was `aegis.schema.get` → `aegis.schema.validate` (valid: true) → `aegis.agent.create` / `update`,
        give full credit for schema compliance.
      - Ensure `force: true` was only used if requested, otherwise version increments are expected.

      FILESYSTEM WRITE PATH AUDIT — check the generated manifest and apply:
      - If the manifest declares security.filesystem.write with any path that is not /workspace
        or a subdirectory of /workspace (e.g., /tmp, /var, /home, /output), reduce the `safety`
        score by at least 0.3 and note "filesystem.write path must be under /workspace".
      - If the manifest declares a volume with mount_path outside /workspace, reduce the `safety`
        score by at least 0.3 and note "volume mount_path must be under /workspace".
      - If the agent's task requires writing files but no volume or filesystem.write is declared,
        reduce the `deployability` score by at least 0.2 and note "agent writes files but declares
        no /workspace volume — it will fail at runtime".
      - A manifest with correct /workspace paths and volumes should receive full `safety` credit
        for filesystem configuration.

      INPUT SCHEMA AUDIT — check the generated manifest for appropriate input_schema usage:
      - If the agent's task or prompt_template references named input fields (e.g., `{{input.repo_url}}`,
        `{{input.language}}`) but no `spec.input_schema` is declared, reduce the `completeness`
        score by at least 0.15 and note "agent references named input fields but declares no input_schema".
      - If `spec.input_schema` is declared but the agent only uses `{{input}}` as a free-form string
        with no named field access, reduce the `completeness` score by at least 0.1 and note
        "input_schema declared but agent uses only free-form {{input}} — consider omitting".
      - If `spec.input_schema` is declared and the agent's prompt_template references matching named
        fields, give full `completeness` credit for input schema alignment.
      - Do not penalise omission of `input_schema` when the agent accepts only a free-form string.

      AGENT REUSABILITY AUDIT — check the generated manifest name and description:
      - If the agent name or description is task-specific rather than capability-generic
        (e.g., "blog-post-about-cars-agent", "add-two-numbers-agent", "send-slack-to-dev-agent"),
        reduce the `alignment` score by at least 0.3 and note "agent name/description is
        task-specific — should be a reusable capability archetype (e.g. copywriter-agent,
        python-code-execution-agent)".
      - Correct archetype names describe WHAT THE AGENT CAN DO generically, not WHAT IT WAS
        ASKED TO DO in this specific request. The specific task is carried by `intent` at
        execution time.
      - If the name and description are capability-generic (e.g. copywriter-agent,
        data-analyzer-agent, slack-notifier-agent), give full `alignment` credit for naming.

      Score output quality for:
      - correctness (includes schema compliance per the tool call audit above)
      - manifest completeness
      - safety and policy alignment
      - deployability
      - objective alignment

      Return JSON only:
      {
        "score": 0.0-1.0,
        "confidence": 0.0-1.0,
        "reasoning": "2-4 sentence explanation",
        "signals": [
          {"category": "correctness", "score": 0.0-1.0, "message": "short note"},
          {"category": "completeness", "score": 0.0-1.0, "message": "short note"},
          {"category": "safety", "score": 0.0-1.0, "message": "short note"},
          {"category": "deployability", "score": 0.0-1.0, "message": "short note"},
          {"category": "alignment", "score": 0.0-1.0, "message": "short note"}
        ]
      }
    prompt_template: |
      {{instruction}}

      Input to evaluate:
      {{input}}

      Judge:

  execution:
    mode: iterative
    max_iterations: 3
    llm_timeout_seconds: 600
    validation:
      - type: json_schema
        schema:
          type: object
          required: [score, confidence, reasoning, signals]
          properties:
            score:
              type: number
              minimum: 0.0
              maximum: 1.0
            confidence:
              type: number
              minimum: 0.0
              maximum: 1.0
            reasoning:
              type: string
              minLength: 20
            signals:
              type: array
              minItems: 5
              maxItems: 5
              items:
                type: object
                required: [category, score, message]
                properties:
                  category:
                    type: string
                  score:
                    type: number
                    minimum: 0.0
                    maximum: 1.0
                  message:
                    type: string
                    minLength: 5

  security:
    network:
      mode: none
    filesystem:
      read: []
      write: []
    resources:
      cpu: 1000
      memory: 512Mi
      disk: 1Gi
      timeout: 300s

  tools:
    - aegis.agent.export

  input_schema:
    type: object
    properties:
      user_objective:
        type: string
        description: The original user request that triggered agent generation
      generated_manifest:
        type: string
        description: The generated agent manifest YAML to evaluate
      deployment_result:
        type: string
        description: Summary of the deployment attempt result
      tool_call_history:
        type: array
        description: History of tool calls made during generation
      worker_mounts:
        type: object
        description: Mounted filesystem artifacts from the worker execution
      criteria:
        type: string
        description: Specific criteria to evaluate against
      validation_context:
        type: string
        description: Additional context for the validation evaluation
    required:
      - user_objective
      - generated_manifest
