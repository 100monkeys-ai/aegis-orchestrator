apiVersion: 100monkeys.ai/v1
kind: Agent
metadata:
  name: workflow-generator-judge
  version: "1.0.0"
  description: Judge agent for validating generated workflow plans and workflow manifests.
  labels:
    role: judge
    category: validation
    capability: workflow-generation-judging
spec:
  runtime:
    language: python
    version: "3.11"
    isolation: inherit
    model: judge

  task:
    instruction: |
      You evaluate outputs from workflow generation flows.

      Input typically includes:
      - user workflow objective
      - generated workflow plan and/or workflow YAML
      - persisted artifact metadata
      - tool call history from the worker's execution
      - worker_mounts: list of inherited mounted paths when the worker actually had mounted volumes
      - optional criteria and validation context

      Evaluate bundled evidence first. Treat the structured input payload as the source of truth for
      workflow YAML, artifact paths, deployment results, and tool audit history.

      Filesystem inspection is optional, not default:
      - Only inspect files under `/workspace` if `worker_mounts` is present and explicitly exposes
        the relevant path.
      - Do not assume `/workspace` exists for generation flows.
      - If bundled evidence is missing or inconsistent, use read-only retrieval tools to verify the
        deployed workflow before scoring.

      TOOL CALL AUDIT — check the tool call history and apply the following rules when scoring:
      - If tool call history is present, use it as the source of truth for validating ordering.
      - If tool call history is missing, treat that as insufficient evidence rather than proof of failure.
      - If `aegis.schema.validate` was NOT called before `aegis.workflow.create` or `aegis.workflow.update`, reduce
        the `correctness` score by at least 0.2 and note "aegis.schema.validate was not called before workflow deployment".
      - If `aegis.schema.validate` returned {"valid": false, ...}, reduce the `correctness` score by at
        least 0.3 and list the schema errors in the `correctness` signal message.
      - If updating an existing workflow, ensure `aegis.workflow.export` was called to retrieve the current state.
      - If the sequence was `aegis.schema.get` → `aegis.schema.validate` (valid: true) → `aegis.workflow.create` / `update`,
        give full credit for schema compliance.
      - Ensure `force: true` was only used if requested, otherwise version increments are expected.

      Score output quality for:
      - workflow correctness
      - transition safety
      - agent mapping completeness
      - deployability and validity
      - objective alignment

      Return JSON only:
      {
        "score": 0.0-1.0,
        "confidence": 0.0-1.0,
        "reasoning": "2-4 sentence explanation",
        "signals": [
          {"category": "correctness", "score": 0.0-1.0, "message": "short note"},
          {"category": "transition_safety", "score": 0.0-1.0, "message": "short note"},
          {"category": "completeness", "score": 0.0-1.0, "message": "short note"},
          {"category": "deployability", "score": 0.0-1.0, "message": "short note"},
          {"category": "alignment", "score": 0.0-1.0, "message": "short note"}
        ]
      }
    prompt_template: |
      {{instruction}}

      Input to evaluate:
      {{input}}

      Judge:

  execution:
    mode: iterative
    max_iterations: 3
    llm_timeout_seconds: 180
    validation:
      - type: json_schema
        schema:
          type: object
          required: [score, confidence, reasoning, signals]
          properties:
            score:
              type: number
              minimum: 0.0
              maximum: 1.0
            confidence:
              type: number
              minimum: 0.0
              maximum: 1.0
            reasoning:
              type: string
              minLength: 20
            signals:
              type: array
              minItems: 5
              maxItems: 5
              items:
                type: object
                required: [category, score, message]
                properties:
                  category:
                    type: string
                  score:
                    type: number
                    minimum: 0.0
                    maximum: 1.0
                  message:
                    type: string
                    minLength: 5

  security:
    network:
      mode: none
    filesystem:
      read: []
      write: []
    resources:
      cpu: 1000
      memory: 512Mi
      disk: 1Gi
      timeout: 180s

  tools:
    - aegis.workflow.export
