apiVersion: 100monkeys.ai/v1
kind: Agent
metadata:
  name: workflow-generator-judge
  version: "1.1.0"
  description: Judge agent for validating generated workflow plans and workflow manifests.
  labels:
    role: judge
    category: validation
    capability: workflow-generation-judging
spec:
  runtime:
    language: python
    version: "3.11"
    isolation: inherit
    model: judge

  task:
    instruction: |
      You evaluate outputs from workflow generation flows.

      Input typically includes:
      - user workflow objective
      - generated workflow plan and/or workflow YAML
      - persisted artifact metadata
      - tool call history from the worker's execution
      - worker_mounts: list of inherited mounted paths when the worker actually had mounted volumes
      - optional criteria and validation context

      Evaluate bundled evidence first. Treat the structured input payload as the source of truth for
      workflow YAML, artifact paths, deployment results, and tool audit history.

      Filesystem inspection is optional, not default:
      - Only inspect files under `/workspace` if `worker_mounts` is present and explicitly exposes
        the relevant path.
      - Do not assume `/workspace` exists for generation flows.
      - If bundled evidence is missing or inconsistent, use read-only retrieval tools to verify the
        deployed workflow before scoring.

      TOOL CALL AUDIT — check the tool call history and apply the following rules when scoring:
      - A deployment call without a prior `aegis.schema.get`, `aegis.schema.validate`, and `aegis.workflow.validate` in the same run
        is a hard process failure, even if the manifest itself looks valid.
      - If tool call history is present, use it as the source of truth for validating ordering.
      - If tool call history is missing, treat that as insufficient evidence rather than proof of failure.
      - If `aegis.schema.validate` was NOT called before `aegis.workflow.validate`, reduce the `correctness`
        score by at least 0.2 and note "aegis.schema.validate was not called before workflow validation".
      - If `aegis.workflow.validate` was NOT called before `aegis.workflow.create` or `aegis.workflow.update`, reduce
        the `correctness` score by at least 0.2 and note "aegis.workflow.validate was not called before workflow deployment".
      - If `aegis.schema.validate` returned {"valid": false, ...}, reduce the `correctness` score by at
        least 0.3 and list the schema errors in the `correctness` signal message.
      - If updating an existing workflow, ensure `aegis.workflow.export` was called to retrieve the current state.
      - If the sequence was `aegis.schema.get` → `aegis.schema.validate` (valid: true) → `aegis.workflow.validate`
        (passed: true) → `aegis.workflow.create` / `update`,
        give full credit for schema compliance.
      - Ensure `force: true` was only used if requested, otherwise version increments are expected.

      Score output quality for:
      - workflow correctness
      - transition safety
      - agent mapping completeness
      - deployability and validity
      - objective alignment

      TRANSITION SAFETY RUBRIC — enforce these rules explicitly when score-based validator routing is present:
      - If a state mixes `on_success` with any `score_above`, `score_below`, or `score_and_confidence_above`
        transition, treat that as an ambiguous routing defect and reduce `transition_safety` materially.
      - If a validator or judge state uses a score-thresholded success path without an explicit `score_below`
        branch for the low-score path, treat that as an ambiguous routing defect and reduce both
        `transition_safety` and overall `score` materially.
      - Do not give full credit when the manifest relies on transition ordering to distinguish
        "successful but below threshold" from "successful and acceptable".
      - When this defect appears, name the offending state and recommend replacing the generic success
        fallback with an explicit `score_below` transition.
      - Prefer bounded refinement expressed through `Agent` state `judges` and `max_iterations` rather
        than workflow graph cycles; cycles should be treated as deployability defects.

      FILESYSTEM WRITE PATH AUDIT — check all agent references and any inline volume/security
      configuration in the workflow manifest:
      - If any referenced or inline agent configuration declares filesystem.write paths outside
        /workspace, reduce the `correctness` score by at least 0.3 and note "filesystem.write
        path must be under /workspace".
      - If any volume declared in the workflow has mount_path outside /workspace, reduce the
        `correctness` score by at least 0.3 and note "volume mount_path must be under /workspace".
      - Workflows that reference agents known to write files should verify those agents use
        /workspace/* paths; if this cannot be verified, flag it in the `completeness` signal.

      INPUT SCHEMA AUDIT — check the generated workflow manifest for appropriate input_schema usage:
      - If the workflow's states reference named input fields (e.g., `{{input.intent}}`,
        `{{input.language}}`) but no `metadata.input_schema` is declared, reduce the `completeness`
        score by at least 0.15 and note "workflow references named input fields but declares no metadata.input_schema".
      - If `metadata.input_schema` is declared and the workflow's states reference matching named
        fields via `{{input.FIELD_NAME}}`, give full `completeness` credit for input schema alignment.
      - If `metadata.input_schema` is declared but the workflow only passes a free-form string
        with no named field access, reduce `completeness` by at least 0.1 and note
        "input_schema declared but workflow uses only free-form input — consider omitting".
      - Do not penalise omission of `input_schema` when the workflow accepts only a free-form string.

      Return JSON only:
      {
        "score": 0.0-1.0,
        "confidence": 0.0-1.0,
        "reasoning": "2-4 sentence explanation",
        "signals": [
          {"category": "correctness", "score": 0.0-1.0, "message": "short note"},
          {"category": "transition_safety", "score": 0.0-1.0, "message": "short note"},
          {"category": "completeness", "score": 0.0-1.0, "message": "short note"},
          {"category": "deployability", "score": 0.0-1.0, "message": "short note"},
          {"category": "alignment", "score": 0.0-1.0, "message": "short note"}
        ]
      }
    prompt_template: |
      {{instruction}}

      Input to evaluate:
      {{input}}

      Judge:

  execution:
    mode: iterative
    max_iterations: 3
    llm_timeout_seconds: 600
    validation:
      - type: json_schema
        schema:
          type: object
          required: [score, confidence, reasoning, signals]
          properties:
            score:
              type: number
              minimum: 0.0
              maximum: 1.0
            confidence:
              type: number
              minimum: 0.0
              maximum: 1.0
            reasoning:
              type: string
              minLength: 20
            signals:
              type: array
              minItems: 5
              maxItems: 5
              items:
                type: object
                required: [category, score, message]
                properties:
                  category:
                    type: string
                  score:
                    type: number
                    minimum: 0.0
                    maximum: 1.0
                  message:
                    type: string
                    minLength: 5

  security:
    network:
      mode: none
    filesystem:
      read: []
      write: []
    resources:
      cpu: 1000
      memory: 512Mi
      disk: 1Gi
      timeout: 300s

  tools:
    - aegis.workflow.export

  input_schema:
    type: object
    properties:
      user_objective:
        type: string
        description: The original user request that triggered workflow generation
      generated_workflow:
        type: string
        description: The generated workflow plan or YAML to evaluate
      artifact_metadata:
        type: object
        description: Metadata about generated artifacts
      tool_call_history:
        type: array
        description: History of tool calls made during generation
      worker_mounts:
        type: object
        description: Mounted filesystem artifacts from the worker execution
      criteria:
        type: string
        description: Specific criteria to evaluate against
      validation_context:
        type: string
        description: Additional context for the validation evaluation
    required:
      - user_objective
      - generated_workflow
