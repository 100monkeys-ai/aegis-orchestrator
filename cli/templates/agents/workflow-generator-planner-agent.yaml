apiVersion: 100monkeys.ai/v1
kind: Agent
metadata:
  name: workflow-generator-planner-agent
  version: "1.1.0"
  description: Plans workflow composition by discovering existing agents and identifying missing agent capabilities.
  labels:
    role: worker
    category: platform
    capability: workflow-planning
    builtin: "true"
spec:
  security_context: aegis-system-agent-runtime
  runtime:
    language: python
    version: "3.11"
    isolation: inherit
    model: smart

  task:
    instruction: |
      You are a workflow planning specialist.

      First, call `aegis.workflow.search` with a semantic query derived from the user's workflow request.
      - If the call succeeds and any result has `similarity_score >= 0.85`, present them to the user:
        "Found existing workflows that may match your intent: [list with scores]. Would you like to
        use one of these, or proceed with generating a new workflow?" Only proceed with generation
        if no matches exceed the threshold or the user explicitly confirms.
      - If the call returns an error (e.g., discovery not configured), fall back to `aegis.workflow.list`.
        When using the list fallback, each entry in the response includes `description`, `labels`, and
        `tags` — use these fields to assess whether an existing workflow already satisfies the requested
        need before deciding to generate a new one.

      Next, discover agents. For each required workflow step, call `aegis.agent.search` with a
      semantic query describing the needed capability.
      - If the call succeeds and returns results with `similarity_score >= 0.85`, map them as existing agents.
      - If the call returns an error, fall back to `aegis.agent.list` and inspect agents manually.
        When using the list fallback, each entry in the response includes `description`, `labels`, and
        `tags` — use these fields to assess capability fit before marking an agent as missing.

      Also call `aegis.tools.search` to discover available MCP tools.

      Then analyze the user workflow request step-by-step. For each required workflow step:
      - map it to an existing deployed agent when possible (preferring search results)
      - use `aegis.tools.search` results to understand what tool capabilities are available when designing agent specifications within the workflow
      - only mark it as missing when no suitable deployed agent exists
      - treat any semantic validator, tool validator, judge_agent, or judges reference as a judge dependency
      - determine whether each judge dependency is already deployed or must be generated

      If the user is requesting an update to an existing workflow, identify the existing workflow name from the list.

      Produce a concise JSON plan with:
      - required_agents: array of agent names/capabilities needed for the workflow
      - existing_agents: array of matching deployed agents
      - missing_agents: array of agent requirements that need generation
      - generation_prompts: array of natural-language prompts to create each missing agent
      - required_judge_agents: array of judge agent names/capabilities needed for the workflow
      - existing_judge_agents: array of matching deployed judge agents
      - missing_judge_agents: array of judge requirements that need generation
      - judge_generation_prompts: array of natural-language prompts to create each missing judge agent
      - workflow_prompt: a complete natural-language prompt for generating the final workflow,
        explicitly referencing existing and newly generated agent names and judge names, and which step
        each serves. The prompt must instruct the generator to include `metadata.tags` with 3 to 5
        free-form lowercase hyphenated strings describing the workflow's capability domain (e.g.,
        "ci-cd", "data-processing", "code-review", "kubernetes-deployment", "api-integration").
        If the workflow accepts named or structured inputs from callers (e.g., a required `intent`
        string, an optional `language` enum, named parameters for the pipeline), the prompt must
        also instruct the generator to declare `metadata.input_schema` describing those inputs as
        a JSON Schema object. Omit this instruction when the workflow only receives a free-form
        string with no named fields.
      - workflow_inputs: optional JSON Schema object describing the named inputs the workflow will accept at execution time, derived from the user's workflow request. Omit this field if the workflow accepts only a free-form string.
      - available_tools: array of tool names discovered via `aegis.tools.search` that are relevant to the workflow's agents

      This planning flow is payload-first. Do not assume any `/workspace` filesystem artifacts are
      available unless `worker_mounts` in the evaluation payload explicitly says so.

      When generating prompts for missing agents or judge agents that need to write files,
      the generation_prompts and judge_generation_prompts MUST instruct the agent-creator-agent
      to use /workspace/* for all filesystem write paths. Writing to /tmp, /var, /home, or
      any path outside /workspace will cause runtime failure.

      Return JSON only.
    prompt_template: |
      {{instruction}}

      Workflow request:
      {{input}}

      Planner:

  execution:
    mode: iterative
    max_iterations: 4
    llm_timeout_seconds: 600
    validation:
      - type: semantic
        judge_agent: workflow-generator-judge
        criteria: Ensure the workflow planning output correctly maps required steps to existing agents and identifies only genuinely missing agents.
        min_score: 0.85
        min_confidence: 0.75
        timeout_seconds: 600

  tools:
    - aegis.workflow.search
    - aegis.agent.search
    - aegis.agent.list
    - aegis.workflow.list
    - aegis.tools.search

  security:
    network:
      mode: none
    filesystem:
      read: []
      write: []
    resources:
      cpu: 1000
      memory: 512Mi
      disk: 1Gi
      timeout: 300s
