# AEGIS Agent Host - Minimal Configuration
#
# This is a minimal configuration to get started.
# Refer to config-with-examples.yaml for full documentation.

# Kubernetes-style manifest format (required)
apiVersion: 100monkeys.ai/v1
kind: NodeConfig

# Node identity and metadata
metadata:
  name: "my-aegis-node"
  version: "1.0.0"
  # labels:
  #   environment: "development"
  #   region: "us-west-2"

# Node configuration specification
spec:
  node:
    id: "change-me-to-unique-id"
    type: "edge"
    # region: "us-west-2"  # Optional
    # tags: ["development"]  # Optional

  llm_providers:
    - name: "local"
      type: "ollama"
      endpoint: "http://localhost:11434"
      enabled: true
      models:
        - alias: "default"
          model: "llama3.2:latest"
          capabilities: ["code", "reasoning"]
          context_window: 8192
          cost_per_1k_tokens: 0.0
        - alias: "fast"
          model: "qwen2.5-coder:7b"
          capabilities: ["code"]
          context_window: 4096
          cost_per_1k_tokens: 0.0

  llm_selection:
    strategy: "prefer-local"
    default_provider: "local"
    max_retries: 3
    retry_delay_ms: 1000

  # Maximum number of executions returned by a single `list_executions` request.
  # Defaults to 1000 if omitted.
  # max_execution_list_limit: 1000

  runtime:
    # bootstrap_script: "assets/bootstrap.py"  # Optional (default)
    # default_isolation: "inherit"             # Optional (default: inherit)
    # Agent container networking (Docker/Podman deployments)
    # container_network_mode: "env:AEGIS_CONTAINER_NETWORK"  # Optional, read from environment
    # Orchestrator URL for agent bootstrap callbacks
    # orchestrator_url: "env:AEGIS_ORCHESTRATOR_URL"    # Optional (default: http://localhost:8088)
    # NFS server hostname/IP for volume mounts (ADR-036)
    # nfs_server_host: "env:AEGIS_NFS_HOST"             # Optional (default: 127.0.0.1)
    # nfs_port: 2049                                    # Optional (default: 2049)
    # nfs_mountport: 2049                               # Optional (default: 2049)

  network:
    # bind_address: "0.0.0.0"  # Optional (default: 0.0.0.0)
    # port: 8088               # Optional (default: 8088)
    # orchestrator_endpoint: "https://orchestrator.aegis.ai"  # Optional
    # heartbeat_interval_seconds: 30  # Optional

  observability:
    logging:
      level: "info"
    # metrics:
    #   enabled: true
    #   port: 9091
    #   path: "/metrics"
    # tracing:
    #   enabled: false

  # Deploy vendored built-in agent and workflow templates on startup.
  # Required for aegis.agent.generate and aegis.workflow.generate to function.
  # deploy_builtins: false

  # Force re-deploy all built-in agents and workflows on startup, even if already registered.
  # Use after a platform upgrade to flush stale definitions. Accepts "true" or "env:VAR_NAME".
  # Default: disabled (omit or set to "false").
  # force_deploy_builtins: "false"

  # storage:
  #   backend: "local_host"  # Local filesystem (default) or "seaweedfs" for distributed storage
  #   # For SeaweedFS configuration, see config-with-examples.yaml

  # database:
  #   url: "env:AEGIS_DATABASE_URL"       # PostgreSQL connection URL (supports env:VAR_NAME)
  #   max_connections: 5                   # Connection pool size (default: 5)
  #   connect_timeout_seconds: 5           # Connection timeout (default: 5)

  # temporal:
  #   address: "temporal:7233"             # Temporal server address
  #   worker_http_endpoint: "http://localhost:3000"  # Worker HTTP callback endpoint
  #   worker_secret: "env:TEMPORAL_WORKER_SECRET"    # Worker callback auth secret
  #   namespace: "default"                 # Temporal namespace
  #   task_queue: "aegis-agents"           # Temporal task queue
  #   max_connection_retries: 30           # Temporal client connection retries

  # cortex:
  #   grpc_url: "http://cortex:50052"      # Cortex gRPC service URL
  #   api_key: null                         # Set to your 100monkeys Cortex API key (Zaru SaaS)

  # billing:                                # Stripe billing (SaaS mode only, omit for self-hosted)
  #   stripe_secret_key: "env:STRIPE_SECRET_KEY"
  #   price_ids:
  #     pro_monthly: "env:STRIPE_PRICE_PRO_MONTHLY"
