# AEGIS Edge Daemon configuration (ADR-117).
# Generated by `aegis edge enroll`. `tenant_id` is populated automatically on
# successful enrollment and is immutable thereafter.

apiVersion: 100monkeys.ai/v1
kind: NodeConfig
metadata:
  name: edge

spec:
  node:
    id: ""               # populated on first enrollment
    type: edge
  cluster:
    enabled: true
    role: edge
    controller:
      endpoint: "{{CONTROLLER_ENDPOINT}}"
      tls:
        enabled: true
    node_keypair_path: ~/.aegis/edge/node.key
    heartbeat_interval_secs: 30
    edge:
      # `tenant_id` is written by `aegis edge enroll` after the JWT is
      # redeemed. Do NOT edit this field by hand.
      tenant_id: null
      enrollment_token_path: ~/.aegis/edge/enrollment.jwt
      node_security_token_path: ~/.aegis/edge/node.token
      stream_reconnect_backoff_secs: [1, 2, 5, 15, 60]
      capabilities:
        # Tools the daemon is willing to dispatch locally. The default set
        # is host-aware (detected from `which`).
        local_tools:
          - shell
        # POSIX mount points exposed to fs.* tools.
        mount_points:
          - "/"
        # Daemon-advertised k/v labels (region, gpu, etc.). Operator-managed
        # tags are kept server-side and never authored from this file.
        custom_labels: {}

  # SecurityContexts (ADR-083) applied locally on edge for InvokeTool calls.
  security_contexts: []
