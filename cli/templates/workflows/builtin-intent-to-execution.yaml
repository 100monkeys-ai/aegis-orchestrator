apiVersion: 100monkeys.ai/v1
kind: Workflow
metadata:
  name: builtin-intent-to-execution
  version: "1.0.0"
  description: >-
    Seamless intent-to-execution pipeline. Accepts a natural-language intent and
    optional typed inputs, dispatches to a builtin language executor agent to write
    code to an ephemeral workspace volume, executes it in an isolated container,
    and returns a formatted result via output_handler. Invoked via the
    aegis.execute.intent MCP tool from Zaru Execute mode.
  labels:
    category: platform
    type: builtin-execute
    builtin: "true"
    adr: "087"
  output_schema:
    type: object
    properties:
      result:
        type: string
        description: The formatted execution result
      exit_code:
        type: integer
        description: Process exit code (0 = success)
    required:
      - result
  output_template:
    result: "{{EXECUTE_CODE.stdout}}"
    exit_code: "{{EXECUTE_CODE.exit_code}}"
  input_schema:
    type: object
    properties:
      language:
        type: string
        description: Target programming language (python, javascript, bash)
        default: python
      language_ext:
        type: string
        description: File extension for the generated code file (e.g. py, js, sh)
        default: py
      runner:
        type: string
        description: Executable used to run the generated code file (e.g. python3, node, bash)
        default: python3
      runner_flags:
        type: string
        description: >-
          Extra flags injected between the runner and the script path.
          Set to "-s" for Python to prevent sys.path[0] injection of /workspace,
          which triggers a FUSE readdir on import and causes an I/O error.
          Leave empty for JavaScript and Bash.
        default: "-s"
      container_image:
        type: string
        description: OCI container image used to execute the generated code
        default: python:3.12-slim
      inputs:
        type: object
        description: Named input values embedded into the generated code
        additionalProperties: true
      inputs_json:
        type: string
        description: JSON-serialized representation of inputs, injected as INTENT_INPUTS env var
        default: "{}"
spec:
  initial_state: WRITE_CODE
  max_total_transitions: 20

  storage:
    workspace:
      storage_class: ephemeral
      ttl_hours: 1
      size_limit_mb: 256

  states:
    WRITE_CODE:
      kind: Agent
      max_state_visits: 3
      agent: "aegis-{{input.language}}-executor-agent"
      intent: "{{intent}}"
      input: |
        INTENT_INPUTS keys: {{{keys input.inputs}}}
        INTENT_INPUTS JSON: {{{input.inputs_json}}}

        {{#if blackboard.EXECUTE_CODE}}
        PREVIOUS RUNTIME ERROR (exit_code={{blackboard.EXECUTE_CODE.output.exit_code}}):
        {{{blackboard.EXECUTE_CODE.output.stderr}}}
        Fix the bug and rewrite the solution.
        {{/if}}

        {{#if blackboard.VALIDATE_CODE}}
        PREVIOUS VALIDATION FAILURE:
        {{{blackboard.VALIDATE_CODE.output.summary}}}
        Fix the issues and rewrite the solution.
        {{/if}}
      transitions:
        - condition: on_success
          target: VALIDATE_CODE
        - condition: on_failure
          target: WRITE_FAILED

    VALIDATE_CODE:
      kind: Agent
      max_state_visits: 3
      agent: aegis-code-validator-agent
      intent: "Validate /workspace/solution.{{input.language_ext}}"
      input: |
        File: /workspace/solution.{{input.language_ext}}
        Read /workspace/solution.{{input.language_ext}} using fs.read and validate it.
        Language: {{input.language}}
        INTENT_INPUTS: {{{input.inputs_json}}}
      transitions:
        - condition: custom
          expression: "state_output.output.valid"
          target: EXECUTE_CODE
        - condition: on_success
          target: WRITE_CODE
        - condition: on_failure
          target: WRITE_FAILED

    EXECUTE_CODE:
      kind: ContainerRun
      max_state_visits: 3
      name: execute-user-code
      image: "{{input.container_image}}"
      command: ["{{input.runner}}", "{{input.runner_flags}}", "/workspace/solution.{{input.language_ext}}"]
      workdir: /workspace
      env:
        INTENT_INPUTS: "{{{input.inputs_json}}}"
      volumes:
        - name: workspace
          mount_path: /workspace
          read_only: true
      resources:
        cpu: 500
        memory: "256Mi"
        timeout: "600s"
      shell: false
      network_mode: "none"
      run_as_user: "65534:65534"
      read_only_root_filesystem: true
      output_handler:
        type: agent
        agent_id: aegis-output-formatter-agent
        input_template: |
          The user's original request: {{intent}}

          The code produced this output:
          {{output}}

          Format as a clean, human-readable answer in one sentence or less.
          State the result directly. Do not include code. Just give the answer.
        timeout_seconds: 60
        required: true
      transitions:
        - condition: exit_code_non_zero
          target: EXECUTION_FAILED

    WRITE_FAILED:
      kind: System
      command: "echo 'Pipeline failed at WRITE_CODE'"
      transitions: []

    EXECUTION_FAILED:
      kind: System
      max_state_visits: 2
      command: "echo 'Pipeline failed at EXECUTE_CODE, exit_code={{blackboard.EXECUTE_CODE.output.exit_code}}'"
      transitions:
        - condition: on_success
          target: WRITE_CODE
