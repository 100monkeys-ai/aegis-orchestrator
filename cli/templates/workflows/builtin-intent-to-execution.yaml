apiVersion: 100monkeys.ai/v1
kind: Workflow
metadata:
  name: builtin-intent-to-execution
  version: "1.0.0"
  description: >-
    Seamless intent-to-execution pipeline. Accepts a natural-language intent and
    optional typed inputs, discovers or generates a code-writing agent, writes
    code to an ephemeral workspace volume, executes it in an isolated container,
    and returns a formatted result. Invoked via the aegis.execute.intent MCP tool
    from Zaru Execute mode.
  labels:
    category: platform
    type: builtin-execute
    builtin: "true"
    adr: "087"
  input_schema:
    type: object
    properties:
      language:
        type: string
        description: Target programming language (e.g. python, javascript)
        default: python
      language_ext:
        type: string
        description: File extension for the generated code file (e.g. py, js)
        default: py
      runner:
        type: string
        description: Executable used to run the generated code file (e.g. python3, node)
        default: python3
      container_image:
        type: string
        description: OCI container image used to execute the generated code
        default: python:3.12-slim
      inputs:
        type: object
        description: Named input values embedded into the generated code
        additionalProperties: true
      inputs_json:
        type: string
        description: JSON-serialized representation of inputs, injected as INTENT_INPUTS env var
        default: "{}"
spec:
  initial_state: DISCOVER_OR_GENERATE_AGENT

  storage:
    workspace:
      storage_class: ephemeral
      ttl_hours: 1
      size_limit_mb: 256

  states:
    DISCOVER_OR_GENERATE_AGENT:
      kind: Agent
      agent: intent-executor-discovery-agent
      input: |
        Discover or generate a code-writing agent for this execution request.

        Intent: {{intent}}
        Language: {{input.language}}

        Step 1: Call aegis.agent.search with a query that captures the intent
        and target language. If any result has similarity_score >= 0.85, select it.

        Step 2: If no match found with sufficient confidence, call
        aegis.agent.generate to create a minimal code-writer agent for
        {{input.language}} that writes working code to a given file path
        and prints the result to stdout.

        Return JSON: { "agent_name": "<string>", "created": <bool> }
      transitions:
        - condition: on_success
          target: GENERATE_CODE
        - condition: on_failure
          target: DISCOVERY_FAILED

    GENERATE_CODE:
      kind: Agent
      agent: "{{DISCOVER_OR_GENERATE_AGENT.output.agent_name}}"
      input: |
        Write {{input.language}} code that fulfills this intent:

        Intent: {{intent}}
        Input values: {{input.inputs}}

        Requirements:
        1. Write the complete solution to /workspace/solution.{{input.language_ext}}
        2. The solution MUST print its final result to stdout
        3. Embed the input values directly in the code
        4. Use only the standard library — no third-party packages

        Use fs.write to write to /workspace/solution.{{input.language_ext}}
        Confirm the write succeeded before returning.
      transitions:
        - condition: on_success
          target: EXECUTE_CODE
        - condition: on_failure
          target: GENERATION_FAILED

    EXECUTE_CODE:
      kind: ContainerRun
      name: execute-user-code
      image: "{{input.container_image}}"
      command: ["{{input.runner}}", "/workspace/solution.{{input.language_ext}}"]
      workdir: /workspace
      env:
        INTENT_INPUTS: "{{input.inputs_json}}"
      volumes:
        - name: workspace
          mount_path: /workspace
          read_only: true
      resources:
        cpu: 500
        memory: "256Mi"
        timeout: "300s"
      shell: false
      transitions:
        - condition: exit_code_zero
          target: FORMAT_RESULT
        - condition: exit_code_non_zero
          target: EXECUTION_FAILED

    FORMAT_RESULT:
      kind: Agent
      agent: intent-result-formatter-agent
      max_iterations: 1
      input: |
        The user's original request: {{intent}}

        The code produced this output:
        {{blackboard.EXECUTE_CODE.output.stdout}}

        Format as a clean, human-readable answer in one sentence or less.
        State the result directly. Do not include code. Just give the answer.
      transitions: []

    DISCOVERY_FAILED:
      kind: System
      command: "echo 'Pipeline failed at DISCOVER_OR_GENERATE_AGENT'"
      transitions: []

    GENERATION_FAILED:
      kind: System
      command: "echo 'Pipeline failed at GENERATE_CODE'"
      transitions: []

    EXECUTION_FAILED:
      kind: System
      command: "echo 'Pipeline failed at EXECUTE_CODE, exit_code={{blackboard.EXECUTE_CODE.output.exit_code}}'"
      transitions: []
