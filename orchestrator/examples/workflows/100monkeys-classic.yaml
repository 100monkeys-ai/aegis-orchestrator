# 100monkeys-classic.yaml
#
# Reference 100monkeys iterative refinement workflow.
#
# This workflow replicates the ExecutionSupervisor's generate-validate-refine
# loop using Temporal as the durable execution engine (ADR-022, ADR-005).
#
# The `GENERATE` Agent state drives the inner 100monkeys loop:
#   1. Execute the worker agent.
#   2. If judge agents are present in the blackboard, score the output
#      (gradient 0.0–1.0 via validateOutputActivity).
#   3. If score >= validation_threshold: return success output.
#   4. Otherwise: append validation feedback to the prompt and retry
#      (up to the Temporal activity's startToCloseTimeout retry limit).
#
# Required input at workflow start:
#   task       — Natural language task description for the worker.
#   agent_id   — UUID of the registered worker agent.
#
# Optional input:
#   judge_id   — UUID of a registered judge agent. When provided, the caller
#                must also set `judges` in the context (see below).
#
# Usage (SDK or REST):
#   POST /v1/workflows/temporal/execute
#   {
#     "workflow_name": "100monkeys-classic",
#     "input": {
#       "task": "Write a Python function that reverses a string",
#       "agent_id": "<worker-agent-uuid>"
#     }
#   }
#
# Usage with validation:
#   POST /v1/workflows/temporal/execute
#   {
#     "workflow_name": "100monkeys-classic",
#     "input": {
#       "task": "Write a Python function that reverses a string",
#       "agent_id": "<worker-agent-uuid>"
#     },
#     "blackboard": {
#       "judges": [{ "agent_id": "<judge-agent-uuid>", "weight": 1.0 }],
#       "validation_threshold": 0.85
#     }
#   }

apiVersion: 100monkeys.ai/v1
kind: Workflow

metadata:
  name: 100monkeys-classic
  version: "1.0.0"
  description: |-
    Classic 100monkeys iterative refinement loop. A worker agent executes
    the given task; optional judge agents score the output using gradient
    validation (0.0–1.0). The inner loop refines the agent's response until
    the validation score reaches the threshold or retries are exhausted.

spec:
  initial_state: GENERATE

  # Default blackboard context. Callers may override these via the `blackboard`
  # field of the StartWorkflowExecution request.
  context:
    # Gradient validation threshold (0.0–1.0). Output with score >= this value
    # is considered passing. Irrelevant if `judges` is empty.
    validation_threshold: 0.8

    # Judge agents used for gradient validation. Each entry is:
    #   { agent_id: "<uuid>", weight: <float 0.0–1.0> }
    # An empty list disables validation — the agent runs exactly once.
    judges: []

  states:
    # ---------------------------------------------------------------------------
    # GENERATE: Run the worker agent with iterative refinement.
    #
    # The Temporal activity executes the agent and, if `judges` is non-empty,
    # iteratively refines the output until it scores >= validation_threshold.
    # Output is stored in the blackboard under key "GENERATE".
    # ---------------------------------------------------------------------------
    GENERATE:
      kind: Agent
      agent: "{{workflow.agent_id}}"
      input: "{{workflow.task}}"
      isolation: docker
      timeout: 30m
      transitions:
        # Execution succeeded (agent returned output without unhandled error).
        - condition: on_success
          target: ~
        # Execution failed (unhandled error from the agent container).
        - condition: on_failure
          target: ~
